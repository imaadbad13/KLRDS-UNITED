<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLRDS United League</title>
<style>
  :root{
    --bg:#ffffff; --bg2:#f5f4f0; --border:#dddad2; --text:#1a1a18; --text2:#6b6a64; --text3:#9a988f;
    --accent:#0c447c; --accent-bg:#e6f1fb; --win:#27500a; --lose:#791f1f;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#1c1c1a; --bg2:#262624; --border:#3a3936; --text:#f0efe9; --text2:#b4b2a9; --text3:#888780;
      --accent:#85b7eb; --accent-bg:#0c447c; --win:#97c459; --lose:#f09595;
    }
  }
  * { box-sizing: border-box; }
  body{
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg2); color: var(--text); margin:0; padding:16px;
    line-height:1.5;
  }
  .wrap{ max-width: 720px; margin: 0 auto; }
  h1{ font-size:20px; font-weight:600; margin:0 0 4px; }
  .sub{ font-size:13px; color:var(--text2); margin:0 0 16px; }
  .card{ background:var(--bg); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:16px; }
  .tabs{ display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap; }
  .tabs button{
    flex:1; min-width:80px; padding:10px 8px; border:1px solid var(--border); background:var(--bg);
    border-radius:8px; font-size:13px; font-weight:500; color:var(--text2); cursor:pointer;
  }
  .tabs button.active{ background:var(--accent-bg); color:var(--accent); border-color:var(--accent); }
  table{ width:100%; border-collapse:collapse; font-size:13px; }
  th, td{ padding:8px 4px; text-align:center; border-bottom:1px solid var(--border); }
  th{ color:var(--text2); font-weight:500; font-size:12px; }
  td:first-child, th:first-child{ text-align:left; width:24px; color:var(--text2); }
  td:nth-child(2), th:nth-child(2){ text-align:left; }
  .pname{ font-weight:600; }
  .pteam{ font-size:11px; color:var(--text2); }
  .pts{ font-weight:600; }
  .legtitle{ font-size:13px; font-weight:600; color:var(--text2); margin:16px 0 8px; }
  .fixrow{ display:flex; align-items:center; gap:8px; padding:8px; border:1px solid var(--border); border-radius:8px; margin-bottom:6px; }
  .fixrow .side{ flex:1; font-size:13px; }
  .fixrow .side.right{ text-align:right; }
  .fixrow input{
    width:42px; text-align:center; padding:6px 4px; border:1px solid var(--border); border-radius:6px;
    background:var(--bg); color:var(--text); font-size:14px;
  }
  .fixrow input:disabled{ opacity:0.55; cursor:not-allowed; }
  .resrow{ display:flex; align-items:center; gap:8px; padding:10px; border:1px solid var(--border); border-radius:8px; margin-bottom:6px; }
  .resrow .side{ flex:1; font-size:13px; }
  .resrow .side.right{ text-align:right; }
  .score{ font-weight:600; font-size:14px; min-width:48px; text-align:center; padding:4px 8px; background:var(--bg2); border-radius:6px; }
  .winner{ font-weight:600; }
  .muted{ color:var(--text2); }
  .leglabel{ font-size:11px; color:var(--text3); min-width:36px; text-align:right; }
  .h2hwrap{ overflow-x:auto; }
  .h2htable{ font-size:11px; }
  .h2htable th, .h2htable td{ padding:4px; min-width:34px; }
  .h2htable th:first-child, .h2htable td:first-child{ min-width:60px; }
  .footer-note{ font-size:12px; color:var(--text2); margin-top:10px; }
  .toolbar{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; align-items:center; }
  .toolbar button{
    padding:8px 14px; border:1px solid var(--border); background:var(--bg); color:var(--text);
    border-radius:8px; font-size:12px; cursor:pointer; font-weight:500;
  }
  .toolbar button:hover{ background: var(--bg2); }
  textarea{
    width:100%; min-height:80px; font-family: monospace; font-size:11px; padding:8px;
    border:1px solid var(--border); border-radius:8px; background:var(--bg); color:var(--text); resize:vertical;
  }
  .hidden{ display:none; }
  .syncdot{ display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; background:var(--text3); }
  .syncdot.live{ background:var(--win); }
  .syncdot.err{ background:var(--lose); }
</style>
</head>
<body>
<div class="wrap">
  <h1>KLRDS United league</h1>
  <p class="sub">Double round robin · 3 pts win · 1 pt draw · 0 pts loss</p>

  <div class="toolbar">
    <span id="syncStatus" style="font-size:12px;color:var(--text2);display:flex;align-items:center"><span class="syncdot" id="syncDot"></span>Connecting...</span>
  </div>

  <div class="toolbar">
    <span id="lockStatus" style="font-size:12px;color:var(--text2);display:flex;align-items:center;padding:0 4px">View only</span>
    <button id="unlockBtn">Unlock editing</button>
    <button id="resetBtn" class="edit-only hidden">Reset all results</button>
  </div>
  <div id="unlockPanel" class="card hidden">
    <p class="sub" style="margin-bottom:8px">Enter passcode to enable editing</p>
    <div style="display:flex;gap:8px">
      <input id="passInput" type="password" placeholder="Passcode" style="flex:1;padding:8px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:14px" />
      <button id="submitPassBtn">Unlock</button>
    </div>
    <p id="passError" class="hidden" style="font-size:12px;color:var(--lose);margin:8px 0 0">Incorrect passcode.</p>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="table">Table</button>
    <button class="tab-btn" data-tab="fixtures">Fixtures</button>
    <button class="tab-btn" data-tab="results">Results</button>
    <button class="tab-btn" data-tab="h2h">Head to head</button>
  </div>

  <div class="card" id="view-table"></div>
  <div class="card hidden" id="view-fixtures"></div>
  <div class="card hidden" id="view-results"></div>
  <div class="card hidden" id="view-h2h"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCpEMV3MzPEWQH1bd6JkAXLAmwRTiAWUBA",
  authDomain: "klrds-united-league.firebaseapp.com",
  projectId: "klrds-united-league",
  storageBucket: "klrds-united-league.firebasestorage.app",
  messagingSenderId: "930231313861",
  appId: "1:930231313861:web:8b0bb39ec24b6818b697ac",
  measurementId: "G-EYTCRH6C6W"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const stateDocRef = doc(db, "league", "state");

const UNLOCK_KEY = "fc26_league_unlocked_v1";
const PASSCODE = "KLRDS";

let isUnlocked = false;
try{ isUnlocked = localStorage.getItem(UNLOCK_KEY) === "1"; }catch(e){}

const players = [
  {name:"Connor", team:"Mexico"},
  {name:"Beef", team:"Ivory Coast"},
  {name:"Cole", team:"Switzerland"},
  {name:"Liam", team:"France"},
  {name:"Ethan", team:"Ecuador"},
  {name:"Mikhyle", team:"Colombia"},
  {name:"Jesse", team:"USA"},
  {name:"Imaad", team:"Japan"},
  {name:"Rayne", team:"Sweden"},
  {name:"Jarrod", team:"Korea Republic"}
];

// Fixed schedule, generated once. [home, away, leg, gameweek]
const FIXED_SCHEDULE = [[7,6,1,1],[2,1,1,1],[5,4,1,1],[8,0,1,1],[9,3,1,1],[5,1,1,2],[4,6,1,2],[0,7,1,2],[9,2,1,2],[3,8,1,2],[8,5,1,3],[7,2,1,3],[6,0,1,3],[4,9,1,3],[3,1,1,3],[5,2,1,4],[1,0,1,4],[7,3,1,4],[9,6,1,4],[4,8,1,4],[3,2,1,5],[1,6,1,5],[9,5,1,5],[4,0,1,5],[8,7,1,5],[3,5,1,6],[6,2,1,6],[9,0,1,6],[7,4,1,6],[1,8,1,6],[4,2,1,7],[8,6,1,7],[1,9,1,7],[5,7,1,7],[3,0,1,7],[4,3,1,8],[0,2,1,8],[8,9,1,8],[5,6,1,8],[1,7,1,8],[9,7,1,9],[5,0,1,9],[1,4,1,9],[2,8,1,9],[6,3,1,9],[1,5,2,10],[3,8,2,10],[7,0,2,10],[6,4,2,10],[9,2,2,10],[5,9,2,11],[1,6,2,11],[2,3,2,11],[4,0,2,11],[8,7,2,11],[0,8,2,12],[6,7,2,12],[4,5,2,12],[3,9,2,12],[2,1,2,12],[1,7,2,13],[3,4,2,13],[0,2,2,13],[5,6,2,13],[9,8,2,13],[4,1,2,14],[8,2,2,14],[7,9,2,14],[5,0,2,14],[6,3,2,14],[0,1,2,15],[8,4,2,15],[5,2,2,15],[3,7,2,15],[6,9,2,15],[3,0,2,16],[5,7,2,16],[9,1,2,16],[4,2,2,16],[6,8,2,16],[6,0,2,17],[9,4,2,17],[7,2,2,17],[8,5,2,17],[1,3,2,17],[4,7,2,18],[3,5,2,18],[2,6,2,18],[0,9,2,18],[1,8,2,18]];

function buildFixtures(){
  let order = 0;
  return FIXED_SCHEDULE.map(([home, away, leg, gw])=>({
    home, away, leg, gw, hg:null, ag:null, seq:order++, playedAt:null
  }));
}

let fixtures = buildFixtures();
let resultCounter = 0;
let suppressNextWrite = false;

function applyRemoteData(data){
  if (!data || !Array.isArray(data.fixtures)) return;
  fixtures = data.fixtures.map((saved, i)=>({
    home: saved.home, away: saved.away, leg: saved.leg, gw: saved.gw,
    hg: saved.hg, ag: saved.ag, seq: i, playedAt: saved.playedAt
  }));
  resultCounter = data.resultCounter || 0;
}

function pushToFirestore(){
  const data = {
    fixtures: fixtures.map(f=>({home:f.home, away:f.away, leg:f.leg, gw:f.gw, hg:f.hg, ag:f.ag, playedAt:f.playedAt})),
    resultCounter
  };
  suppressNextWrite = true;
  setDoc(stateDocRef, data).catch(err=>{
    console.error("Firestore write failed", err);
    setSyncStatus('err', 'Sync error - changes may not save');
  });
}

function setSyncStatus(state, text){
  const dot = document.getElementById('syncDot');
  const label = document.getElementById('syncStatus');
  dot.className = 'syncdot' + (state ? ' '+state : '');
  label.lastChild.textContent = text;
}

function computeStandings(){
  const stats = players.map(()=>({p:0,w:0,d:0,l:0,gf:0,ga:0}));
  fixtures.forEach(f=>{
    if (f.hg===null || f.ag===null) return;
    const h = stats[f.home], a = stats[f.away];
    h.p++; a.p++;
    h.gf += f.hg; h.ga += f.ag;
    a.gf += f.ag; a.ga += f.hg;
    if (f.hg > f.ag){ h.w++; a.l++; }
    else if (f.hg < f.ag){ a.w++; h.l++; }
    else { h.d++; a.d++; }
  });
  return players.map((pl,i)=>{
    const s = stats[i];
    return {idx:i, name:pl.name, team:pl.team, p:s.p, w:s.w, d:s.d, l:s.l,
      gf:s.gf, ga:s.ga, gd:s.gf-s.ga, pts:s.w*3+s.d};
  }).sort((a,b)=> b.pts-a.pts || b.gd-a.gd || b.gf-a.gf || a.name.localeCompare(b.name));
}

function renderTable(){
  const rows = computeStandings();
  const el = document.getElementById('view-table');
  el.innerHTML = `
  <div style="overflow-x:auto">
  <table>
    <thead>
      <tr>
        <th>#</th><th>Player</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th>
      </tr>
    </thead>
    <tbody>
      ${rows.map((r,pos)=>`
        <tr>
          <td>${pos+1}</td>
          <td><div class="pname">${r.name}</div><div class="pteam">${r.team}</div></td>
          <td>${r.p}</td><td>${r.w}</td><td>${r.d}</td><td>${r.l}</td>
          <td>${r.gf}</td><td>${r.ga}</td><td>${r.gd>0?'+':''}${r.gd}</td>
          <td class="pts">${r.pts}</td>
        </tr>
      `).join('')}
    </tbody>
  </table>
  </div>
  <p class="footer-note">${fixtures.filter(f=>f.hg!==null).length} of ${fixtures.length} matches played.</p>
  `;
}

function renderFixtures(){
  const el = document.getElementById('view-fixtures');
  const maxGw = Math.max(...fixtures.map(f=>f.gw));
  let html = '';
  for (let gw=1; gw<=maxGw; gw++){
    const matches = fixtures.map((f,idx)=>({f,idx})).filter(x=>x.f.gw===gw);
    if (matches.length===0) continue;
    const legLabel = matches[0].f.leg;
    html += `
      <div class="legtitle">Gameweek ${gw} <span class="muted" style="font-weight:400">(Leg ${legLabel})</span></div>
      ${matches.map(({f,idx})=>`
        <div class="fixrow">
          <div class="side right">${players[f.home].name} <span class="pteam">(${players[f.home].team})</span></div>
          <input type="number" min="0" step="1" data-idx="${idx}" data-side="h" value="${f.hg===null?'':f.hg}" ${isUnlocked?'':'disabled'} />
          <span class="muted">-</span>
          <input type="number" min="0" step="1" data-idx="${idx}" data-side="a" value="${f.ag===null?'':f.ag}" ${isUnlocked?'':'disabled'} />
          <div class="side">${players[f.away].name} <span class="pteam">(${players[f.away].team})</span></div>
        </div>
      `).join('')}
    `;
  }
  el.innerHTML = html;

  if (!isUnlocked) return;
  el.querySelectorAll('input').forEach(inp=>{
    inp.addEventListener('input', e=>{
      const idx = parseInt(e.target.dataset.idx);
      const side = e.target.dataset.side;
      const f = fixtures[idx];
      const hadResultBefore = f.hg!==null && f.ag!==null;
      const v = e.target.value === '' ? null : Math.max(0, parseInt(e.target.value)||0);
      if (side==='h') f.hg = v; else f.ag = v;
      const hasResultNow = f.hg!==null && f.ag!==null;
      if (!hadResultBefore && hasResultNow) f.playedAt = resultCounter++;
      if (!hasResultNow) f.playedAt = null;
      renderTable(); renderResults(); renderH2H();
      pushToFirestore();
    });
  });
}

function renderResults(){
  const el = document.getElementById('view-results');
  const played = fixtures.filter(f=>f.hg!==null && f.ag!==null).sort((a,b)=>b.playedAt-a.playedAt);
  if (played.length===0){
    el.innerHTML = `<p class="footer-note">No results entered yet. Add scores in the Fixtures tab and they'll show up here.</p>`;
    return;
  }
  el.innerHTML = `
    ${played.map(f=>{
      const home = players[f.home], away = players[f.away];
      const hWin = f.hg > f.ag, aWin = f.ag > f.hg;
      return `
      <div class="resrow">
        <div class="side right ${hWin?'winner':'muted'}">${home.name} <span class="pteam">(${home.team})</span></div>
        <div class="score">${f.hg} - ${f.ag}</div>
        <div class="side ${aWin?'winner':'muted'}">${away.name} <span class="pteam">(${away.team})</span></div>
        <div class="leglabel">GW${f.gw}</div>
      </div>
      `;
    }).join('')}
    <p class="footer-note">${played.length} of ${fixtures.length} matches played. Most recently entered shown first.</p>
  `;
}

function renderH2H(){
  const el = document.getElementById('view-h2h');
  el.innerHTML = `
  <div class="h2hwrap">
  <table class="h2htable">
    <thead>
      <tr><th></th>${players.map(p=>`<th>${p.name.slice(0,3)}</th>`).join('')}</tr>
    </thead>
    <tbody>
      ${players.map((p1,i)=>`
        <tr>
          <td class="pname">${p1.name}</td>
          ${players.map((p2,j)=>{
            if (i===j) return `<td class="muted">-</td>`;
            let w=0,d=0,l=0;
            fixtures.forEach(f=>{
              if (f.hg===null||f.ag===null) return;
              if (f.home===i && f.away===j){
                if (f.hg>f.ag) w++; else if (f.hg<f.ag) l++; else d++;
              } else if (f.home===j && f.away===i){
                if (f.ag>f.hg) w++; else if (f.ag<f.hg) l++; else d++;
              }
            });
            const playedC = w+d+l;
            return `<td class="${playedC?'':'muted'}">${playedC? w+'-'+d+'-'+l : '·'}</td>`;
          }).join('')}
        </tr>
      `).join('')}
    </tbody>
  </table>
  </div>
  <p class="footer-note">Each cell shows the row player's record vs the column player (W-D-L), across both legs.</p>
  `;
}

function renderAll(){
  renderTable(); renderFixtures(); renderResults(); renderH2H();
}

function updateLockUI(){
  const statusEl = document.getElementById('lockStatus');
  const unlockBtn = document.getElementById('unlockBtn');
  statusEl.textContent = isUnlocked ? 'Editing enabled' : 'View only';
  unlockBtn.textContent = isUnlocked ? 'Lock editing' : 'Unlock editing';
  document.querySelectorAll('.edit-only').forEach(el=>{
    el.classList.toggle('hidden', !isUnlocked);
  });
  document.getElementById('unlockPanel').classList.add('hidden');
}

document.getElementById('unlockBtn').addEventListener('click', ()=>{
  if (isUnlocked){
    isUnlocked = false;
    try{ localStorage.removeItem(UNLOCK_KEY); }catch(e){}
    updateLockUI();
    renderFixtures();
  } else {
    document.getElementById('unlockPanel').classList.remove('hidden');
    document.getElementById('passError').classList.add('hidden');
    document.getElementById('passInput').value = '';
    document.getElementById('passInput').focus();
  }
});

document.getElementById('submitPassBtn').addEventListener('click', ()=>{
  const val = document.getElementById('passInput').value;
  if (val === PASSCODE){
    isUnlocked = true;
    try{ localStorage.setItem(UNLOCK_KEY, "1"); }catch(e){}
    updateLockUI();
    renderFixtures();
  } else {
    document.getElementById('passError').classList.remove('hidden');
  }
});

document.getElementById('passInput').addEventListener('keydown', e=>{
  if (e.key === 'Enter') document.getElementById('submitPassBtn').click();
});

document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const tab = btn.dataset.tab;
    ['table','fixtures','results','h2h'].forEach(t=>{
      document.getElementById('view-'+t).classList.toggle('hidden', t!==tab);
    });
  });
});

document.getElementById('resetBtn').addEventListener('click', ()=>{
  if (!isUnlocked) return;
  if (!confirm('Reset all results for everyone? This cannot be undone.')) return;
  fixtures.forEach(f=>{ f.hg=null; f.ag=null; f.playedAt=null; });
  resultCounter = 0;
  renderAll();
  pushToFirestore();
});

updateLockUI();
renderAll();

onSnapshot(stateDocRef, (snapshot)=>{
  if (snapshot.exists()){
    if (suppressNextWrite){
      suppressNextWrite = false;
    } else {
      applyRemoteData(snapshot.data());
      renderAll();
    }
  } else {
    pushToFirestore();
  }
  setSyncStatus('live', 'Live - synced with everyone');
}, (err)=>{
  console.error("Firestore listen failed", err);
  setSyncStatus('err', 'Could not connect - showing local view only');
});
</script>
</body>
</html>
